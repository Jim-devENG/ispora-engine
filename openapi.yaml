components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: 507f1f77bcf86cd799439011
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        userType:
          type: string
          enum: [student, professional, mentor, admin]
          example: student
        username:
          type: string
          example: johndoe
        avatar:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time

    ProjectCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: My Project
        description:
          type: string
          example: Project description
        objectives:
          oneOf:
            - type: string
              description: String with newlines or commas (will be normalized to array)
              example: "Objective 1\nObjective 2\nObjective 3"
            - type: array
              items:
                type: string
              example: ["Objective 1", "Objective 2", "Objective 3"]
        type:
          type: string
          enum: [mentorship, academic, career, community, collaboration]
          default: academic
          example: academic
        category:
          type: string
          default: Uncategorized
          example: Education
        tags:
          type: array
          items:
            type: string
          example: [education, research]
        teamMembers:
          type: array
          items:
            type: object
          example: []
        diasporaPositions:
          type: array
          items:
            type: object
          example: []
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
        university:
          type: string
        mentorshipConnection:
          type: boolean
          default: false
        isPublic:
          type: boolean
          default: true
        visibility:
          type: string
          enum: [public, private]
          default: public

    Project:
      allOf:
        - $ref: '#/components/schemas/ProjectCreate'
        - type: object
          properties:
            id:
              type: string
              example: 507f1f77bcf86cd799439011
            objectives:
              type: array
              items:
                type: string
              description: Always returned as array (canonical format)
              example: ["Objective 1", "Objective 2", "Objective 3"]
            owner:
              type: string
              example: 507f1f77bcf86cd799439012
            creator:
              type: object
              properties:
                id:
                  type: string
                email:
                  type: string
                name:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
            createdAt:
              type: string
              format: date-time
