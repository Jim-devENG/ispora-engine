  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Validation error
              code:
                type: string
                example: INVALID_PAYLOAD
              message:
                type: string
                example: Title is required

    UnauthorizedError:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Session expired
              code:
                type: string
                enum: [NO_TOKEN, TOKEN_EXPIRED, INVALID_TOKEN]
                example: TOKEN_EXPIRED
              message:
                type: string
                example: Your session has expired. Please log in again.

    ForbiddenError:
      description: Permission denied
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Permission denied
              code:
                type: string
                example: FORBIDDEN
              message:
                type: string
                example: You do not have permission to perform this action

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Project not found
              code:
                type: string
                example: NOT_FOUND
              message:
                type: string
                example: The requested project could not be found

    DuplicateError:
      description: Duplicate resource
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: User already exists
              code:
                type: string
                example: DUPLICATE_USER
              message:
                type: string
                example: An account with this email already exists

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Server error
              code:
                type: string
                example: SERVER_ERROR
              message:
                type: string
                example: Failed to process request. Please try again later.

