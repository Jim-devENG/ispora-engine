  /opportunities/{id}/engagement:
    post:
      summary: Record opportunity engagement (view/apply/bookmark/share)
      description: |
        **Phase 2.1:** Records user engagement with an opportunity.
        - `view`: Anonymous allowed, increments metrics only
        - `apply`: Requires authentication, creates engagement record
        - `bookmark`: Requires authentication, creates engagement record
        - `share`: Anonymous allowed (if authenticated, records userId)
      tags:
        - Opportunities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Opportunity ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum: [view, apply, bookmark, share]
                  example: view
                meta:
                  type: object
                  additionalProperties: true
                  example:
                    shareTo: twitter
      responses:
        '200':
          description: Engagement recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Engagement recorded successfully
                  data:
                    type: object
                    properties:
                      engagement:
                        $ref: '#/components/schemas/OpportunityEngagement'
                        nullable: true
                      metrics:
                        $ref: '#/components/schemas/OpportunityMetrics'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
