openapi: 3.0.0
info:
  title: iSpora API
  version: 1.0.0
  description: iSpora Backend API - Phase 1 & Phase 2 Implementation
servers:
  - url: https://ispora-backend.onrender.com/api/v1
    description: Production server
  - url: http://localhost:5000/api/v1
    description: Development server

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
                firstName:
                  type: string
                  example: John
                lastName:
                  type: string
                  example: Doe
                userType:
                  type: string
                  enum: [student, professional, mentor, admin]
                  default: student
                username:
                  type: string
                  example: johndoe
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Registration successful
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/DuplicateError'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /projects:
    post:
      summary: Create a new project
      description: |
        **Phase 1 Critical Fix:** Objectives normalization.
        Frontend sends `objectives` as string, but we normalize to array for storage.
        - String with newlines: "Objective 1\nObjective 2\nObjective 3" → ["Objective 1", "Objective 2", "Objective 3"]
        - String with commas: "Objective 1, Objective 2, Objective 3" → ["Objective 1", "Objective 2", "Objective 3"]
        - Array: ["Objective 1", "Objective 2"] → ["Objective 1", "Objective 2"]
        - Empty/null: "" or null → []
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
            examples:
              objectivesString:
                summary: Objectives as string (newline-separated)
                value:
                  title: My Project
                  description: Project description
                  objectives: "Objective 1\nObjective 2\nObjective 3"
                  type: academic
                  category: Education
              objectivesArray:
                summary: Objectives as array
                value:
                  title: My Project
                  description: Project description
                  objectives: ["Objective 1", "Objective 2", "Objective 3"]
                  type: academic
                  category: Education
              objectivesComma:
                summary: Objectives as string (comma-separated)
                value:
                  title: My Project
                  description: Project description
                  objectives: "Objective 1, Objective 2, Objective 3"
                  type: academic
                  category: Education
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Project created successfully
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

    get:
      summary: Get all projects
      description: Returns paginated list of public projects
      tags:
        - Projects
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
        - name: type
          in: query
          schema:
            type: string
            enum: [mentorship, academic, career, community, collaboration]
          description: Filter by project type
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '500':
          $ref: '#/components/responses/ServerError'

  /projects/{id}:
    get:
      summary: Get project by ID
      tags:
        - Projects
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /projects/updates:
    get:
      summary: Get project updates
      description: |
        **Phase 1 Critical Fix:** Returns updates for user's projects when `mine=true`.
        Protected route - requires authentication.
        - `mine=true`: Returns updates only for projects owned by authenticated user
        - `mine=false` or omitted: Returns all public project updates (if implemented)
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: mine
          in: query
          schema:
            type: boolean
            default: false
          description: If true, return only updates for user's projects
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: Project updates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectUpdate'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /tasks:
    post:
      summary: Create a new task
      description: |
        **Phase 1 Critical Fix:** Tasks integrated with MongoDB.
        Creates a task for a project. Only project owner can create tasks.
      tags:
        - Tasks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - projectId
              properties:
                title:
                  type: string
                  example: Complete project documentation
                description:
                  type: string
                  example: Write comprehensive documentation for the project
                projectId:
                  type: string
                  example: 507f1f77bcf86cd799439011
                assignee:
                  type: string
                  description: User ID of assignee (optional)
                  example: 507f1f77bcf86cd799439012
                status:
                  type: string
                  enum: [todo, doing, done]
                  default: todo
                  example: todo
                priority:
                  type: string
                  enum: [low, medium, high]
                  default: medium
                  example: high
                dueDate:
                  type: string
                  format: date-time
                  example: 2024-12-31T23:59:59Z
                tags:
                  type: array
                  items:
                    type: string
                  example: [documentation, priority]
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Task created successfully
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /tasks/project/{projectId}:
    get:
      summary: Get tasks for a project
      description: |
        Returns tasks for a project. Public/protected based on project visibility.
        - Public projects: No authentication required
        - Private projects: Requires authentication and ownership
      tags:
        - Tasks
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          description: Project ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
        - name: status
          in: query
          schema:
            type: string
            enum: [todo, doing, done]
          description: Filter by task status
        - name: assignee
          in: query
          schema:
            type: string
          description: Filter by assignee ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /tasks/{id}/status:
    patch:
      summary: Update task status
      description: Updates task status. Only project owner can update tasks.
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [todo, doing, done]
                  example: done
      responses:
        '200':
          description: Task status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Task status updated successfully
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications:
    get:
      summary: Get notifications for authenticated user
      description: |
        **Phase 2:** Returns notifications for authenticated user with pagination and filtering.
        Supports filtering by read status and type.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
        - name: read
          in: query
          schema:
            type: boolean
          description: Filter by read status
        - name: type
          in: query
          schema:
            type: string
            enum: [project_update, task_assigned, task_completed, task_due_soon, opportunity_posted, mention, comment, system]
          description: Filter by notification type
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
                      unreadCount:
                        type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications/stream:
    get:
      summary: SSE stream for real-time notifications
      description: |
        **Phase 2:** Server-Sent Events (SSE) stream for real-time notifications.
        Returns text/event-stream with notification events as they occur.
        Includes heartbeat (ping) every 20 seconds to keep connection alive.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: {\"type\":\"connected\",\"message\":\"Connected to notifications stream\",\"userId\":\"...\",\"timestamp\":\"...\"}\n\n"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /notifications/{id}:
    get:
      summary: Get notification by ID
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Notification ID
      responses:
        '200':
          description: Notification retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications/{id}/read:
    patch:
      summary: Mark notification as read
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Notification ID
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Notification marked as read
                  data:
                    $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications/read-all:
    patch:
      summary: Mark all notifications as read
      tags:
        - Notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: All notifications marked as read
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      updatedCount:
                        type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications/{id}:
    delete:
      summary: Delete notification
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Notification ID
      responses:
        '200':
          description: Notification deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Notification deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications/preferences:
    get:
      summary: Get user's notification preferences
      description: |
        **Phase 2.1:** Returns user's notification preferences.
        If preferences don't exist, creates default preferences.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preferences retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/NotificationPreference'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      summary: Update user's notification preferences
      description: |
        **Phase 2.1:** Updates user's notification preferences.
        Partial updates supported - only provided fields are updated.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferences:
                  $ref: '#/components/schemas/NotificationPreferenceUpdate'
      responses:
        '200':
          description: Preferences updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Notification preferences updated successfully
                  data:
                    $ref: '#/components/schemas/NotificationPreference'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications/mute:
    post:
      summary: Mute notifications until a specific date
      description: |
        **Phase 2.1:** Mutes all notifications until the specified date.
        After the date, notifications resume according to preferences.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - until
              properties:
                until:
                  type: string
                  format: date-time
                  example: 2025-02-07T23:59:59Z
                  description: ISO date string until which to mute notifications
      responses:
        '200':
          description: Notifications muted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Notifications muted until 2025-02-07T23:59:59Z
                  data:
                    $ref: '#/components/schemas/NotificationPreference'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /opportunities:
    get:
      summary: Get all opportunities (public)
      description: |
        **Phase 2:** Returns paginated list of public opportunities.
        Admin can see all opportunities including inactive ones.
      tags:
        - Opportunities
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
        - name: type
          in: query
          schema:
            type: string
            enum: [job, scholarship, internship, event, workshop, grant, other]
          description: Filter by opportunity type
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: featured
          in: query
          schema:
            type: boolean
          description: Filter featured opportunities
        - name: search
          in: query
          schema:
            type: string
          description: Search in title, description, organization
      responses:
        '200':
          description: Opportunities retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Opportunity'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      summary: Create a new opportunity (admin only)
      description: |
        **Phase 2:** Creates a new opportunity. Admin only.
        Featured opportunities automatically notify all users.
      tags:
        - Opportunities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpportunityCreate'
      responses:
        '201':
          description: Opportunity created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Opportunity created successfully
                  data:
                    $ref: '#/components/schemas/Opportunity'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/ServerError'

  /opportunities/{id}:
    get:
      summary: Get opportunity by ID (public)
      tags:
        - Opportunities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Opportunity ID
      responses:
        '200':
          description: Opportunity retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Opportunity'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      summary: Update opportunity (admin only)
      tags:
        - Opportunities
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Opportunity ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                type:
                  type: string
                  enum: [job, scholarship, internship, event, workshop, grant, other]
                category:
                  type: string
                organization:
                  type: string
                location:
                  type: string
                workMode:
                  type: string
                  enum: [remote, hybrid, onsite]
                compensation:
                  type: string
                deadline:
                  type: string
                  format: date-time
                applicationLink:
                  type: string
                  format: uri
                contactEmail:
                  type: string
                  format: email
                tags:
