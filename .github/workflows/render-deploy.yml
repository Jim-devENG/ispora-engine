name: Deploy Backend to Render

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'render.yaml'
      - '.github/workflows/render-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render Deploy (via Deploy Hook)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set. Add it in GitHub → Settings → Secrets and variables → Actions" >&2
            exit 1
          fi
          echo "Calling Render deploy hook..."
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
          echo "Deploy hook triggered. Monitor progress in Render → Deploys."

