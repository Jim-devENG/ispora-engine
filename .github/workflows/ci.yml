name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint frontend (root)
        run: npm run -s lint || npm run -s lint --if-present || echo "Linting skipped - no config found"

      - name: Typecheck frontend (root)
        run: |
          if [ -f tsconfig.json ] && grep -q '"typescript"' package.json; then
            npx tsc -p tsconfig.json --noEmit
          else
            echo "Typecheck skipped (no tsconfig or no typescript dep)"
          fi

      - name: Build frontend (root)
        run: npm run -s build

      - name: Lint backend
        run: npm run -s lint --if-present || echo "no backend lint configured"

      - name: Typecheck backend (ts if present)
        run: |
          if [ -f tsconfig.json ] && grep -q '"typescript"' package.json; then
            npx tsc -p tsconfig.json --noEmit
          else
            echo "No TS config/typescript in backend, skipping typecheck"
          fi

      - name: Build backend
        run: npm run -s build --if-present || echo "no backend build step"
